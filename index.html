<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POPCORN STREAM | Cinéma & Trailers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-color: #050505; --text-color: white; --accent: #facc15; --sidebar-bg: #0d0d0d; }
        .light-mode { --bg-color: #f5f5f5; --text-color: #1a1a1a; --accent: #eab308; --sidebar-bg: #ffffff; }

        body { background-color: var(--bg-color); color: var(--text-color); transition: 0.5s; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* --- INTRO STUDIO --- */
        #studio-intro { position: fixed; inset: 0; z-index: 1000; background: black; display: flex; justify-content: center; align-items: center; animation: studioFadeOut 0.8s ease forwards 4s; }
        .studio-wrapper { display: flex; align-items: center; gap: 25px; }
        .popcorn-mascot { position: relative; display: flex; justify-content: center; align-items: center; animation: swirlScale 2s forwards; }
        .pop-emoji { font-size: 120px; filter: drop-shadow(0 0 20px var(--accent)); }
        .packaging-eye { position: absolute; font-size: 50px; top: 50%; left: 50%; transform: translate(-50%, -10%); opacity: 0; animation: eyeAppear 0.5s forwards 2s, blink 0.3s infinite 3s; }
        .studio-name { font-family: 'Syncopate', sans-serif; font-size: 50px; font-weight: 700; color: var(--accent); text-transform: uppercase; opacity: 0; animation: textReveal 1s forwards 2.5s; }
        @keyframes swirlScale { 0% { transform: rotate(-180deg) scale(0); } 100% { transform: rotate(0) scale(1); } }
        @keyframes eyeAppear { to { opacity: 1; transform: translate(-50%, -10%) scale(1); } }
        @keyframes blink { 0%, 90%, 100% { transform: translate(-50%, -10%) scaleY(1); } 95% { transform: translate(-50%, -10%) scaleY(0); } }
        @keyframes textReveal { to { opacity: 1; filter: blur(0); } }
        @keyframes studioFadeOut { to { opacity: 0; visibility: hidden; } }

        /* --- INTERFACE --- */
        .sidebar { width: 280px; height: 100vh; position: fixed; left: 0; top: 0; padding: 40px 20px; border-right: 1px solid rgba(128,128,128,0.1); background: var(--sidebar-bg); z-index: 200; }
        .main-content { margin-left: 280px; padding: 110px 40px 40px; opacity: 0; animation: fadeInMain 1s forwards 4.2s; }
        .top-bar { position: fixed; top: 0; left: 280px; right: 0; height: 85px; display: flex; align-items: center; padding: 0 40px; background: var(--bg-color); z-index: 100; border-bottom: 1px solid rgba(128,128,128,0.1); }
        
        .movie-card { background: rgba(128,128,128,0.05); border-radius: 12px; overflow: hidden; transition: 0.3s; cursor: pointer; height: 100%; display: flex; flex-direction: column; }
        .movie-card:hover { transform: scale(1.03); border: 1px solid var(--accent); }

        #settings-panel { max-height: 0; overflow: hidden; transition: 0.5s; background: rgba(255,255,255,0.05); border-radius: 8px; }
        #settings-panel.open { max-height: 300px; padding: 15px; margin-top: 10px; }

        /* PLAYER */
        #player-modal { position: fixed; inset: 0; background: black; z-index: 2000; display: none; justify-content: center; align-items: center; }
        #player-modal.open { display: flex; }

        @keyframes fadeInMain { to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="studio-intro">
        <div class="studio-wrapper">
            <div class="popcorn-mascot"><div class="pop-emoji">🍿</div><div class="packaging-eye">👁️</div></div>
            <div class="studio-name">Popcorn<br><span style="color:white">Stream</span></div>
        </div>
    </div>

    <aside class="sidebar">
        <div class="text-2xl font-black text-yellow-500 mb-10 italic tracking-tighter uppercase">Popcorn Stream</div>
        
        <nav class="space-y-2 text-gray-400 font-bold">
            <button onclick="changeCategory('films complets français')" class="w-full text-left p-3 rounded-lg hover:bg-yellow-500 hover:text-black transition">🔥 À LA UNE</button>
            <button onclick="changeCategory('film action complet')" class="w-full text-left p-3 rounded-lg hover:bg-yellow-500 hover:text-black transition">🎬 ACTION</button>
            <button onclick="changeCategory('documentaire complet')" class="w-full text-left p-3 rounded-lg hover:bg-yellow-500 hover:text-black transition">🌍 DOCUMENTAIRES</button>
            <button onclick="changeCategory('movie trailers 2024 2025')" class="w-full text-left p-3 rounded-lg hover:bg-yellow-500 hover:text-black transition">🎞️ BANDES-ANNONCES</button>
            
            <div class="pt-6 pb-2 text-[10px] uppercase tracking-widest opacity-50">Configuration</div>
            
            <button onclick="toggleSettings()" class="w-full flex items-center justify-between p-3 rounded-lg bg-white/5 hover:bg-white/10 transition">
                <span>⚙️ PARAMÈTRES</span> <span id="arrow">▾</span>
            </button>
            
            <div id="settings-panel">
                <div class="space-y-4 text-xs">
                    <div class="flex justify-between items-center">
                        <span>PAYS :</span>
                        <select id="lang-select" onchange="refreshContent()" class="bg-black text-white p-1 rounded border border-gray-700">
                            <option value="fr">🇫🇷 FRANCE</option>
                            <option value="en">🇺🇸 USA</option>
                        </select>
                    </div>
                    <div class="flex justify-between items-center">
                        <span>LUMIÈRE :</span>
                        <button onclick="document.body.classList.toggle('light-mode')" class="bg-yellow-500 text-black px-2 py-1 rounded font-black">MODE</button>
                    </div>
                </div>
            </div>
        </nav>
    </aside>

    <header class="top-bar">
        <div class="w-full max-w-2xl relative">
            <input type="text" id="search-input" placeholder="Rechercher un film, un trailer ou Kaizen..." 
                   class="w-full bg-white/5 border border-white/10 rounded-xl px-12 py-3 outline-none focus:border-yellow-500 transition">
            <span class="absolute left-4 top-3.5 opacity-40 text-xl">🔍</span>
        </div>
    </header>

    <main class="main-content">
        <h2 id="current-title" class="text-3xl font-black mb-8 italic uppercase tracking-tighter">CHARGEMENT...</h2>
        <div id="movie-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>
    </main>

    <div id="player-modal">
        <button onclick="closePlayer()" class="absolute top-8 right-8 text-4xl hover:text-yellow-500 transition font-bold">&times; FERMER</button>
        <div class="w-[90%] max-w-5xl aspect-video">
            <iframe id="yt-player" width="100%" height="100%" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyDXc2iuxIR4TXYr53Co43RHVii2Tc7FLgs";
        let currentQuery = "films complets français";

        function toggleSettings() {
            document.getElementById('settings-panel').classList.toggle('open');
        }

        function refreshContent() {
            changeCategory(currentQuery);
        }

        async function fetchMovies(query) {
            currentQuery = query;
            const lang = document.getElementById('lang-select').value;
            const langParam = (lang === 'fr') ? 'fr' : 'en';
            const grid = document.getElementById('movie-grid');
            const titleElem = document.getElementById('current-title');
            
            // On ajoute automatiquement "complet" ou "movie" selon la langue pour filtrer
            let finalQuery = query;
            if (lang === 'fr' && !query.includes('trailers')) finalQuery += " complet français";
            if (lang === 'en' && !query.includes('trailers')) finalQuery += " full movie english";

            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=16&q=${encodeURIComponent(finalQuery)}&type=video&relevanceLanguage=${langParam}&videoDuration=long&key=${API_KEY}`;
            
            // Si c'est des bandes-annonces, on enlève le filtre "long"
            const finalUrl = query.includes('trailers') ? url.replace('&videoDuration=long', '&videoDuration=medium') : url;

            try {
                const res = await fetch(finalUrl);
                const data = await res.json();
                
                grid.innerHTML = '';
                titleElem.innerText = query.replace('film ', '').toUpperCase();

                if (data.items) {
                    data.items.forEach(item => {
                        grid.innerHTML += `
                            <div class="movie-card group" onclick="playMovie('${item.id.videoId}')">
                                <img src="${item.snippet.thumbnails.high.url}" class="w-full aspect-video object-cover">
                                <div class="p-4 flex-grow">
                                    <h3 class="font-bold text-sm line-clamp-2 group-hover:text-yellow-500">${item.snippet.title}</h3>
                                    <p class="text-[10px] text-gray-500 mt-2 uppercase tracking-widest">${item.snippet.channelTitle}</p>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (e) {
                grid.innerHTML = "<p>Erreur de connexion à la base cinéma.</p>";
            }
        }

        function changeCategory(q) { fetchMovies(q); }

        function playMovie(id) {
            document.getElementById('yt-player').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
            document.getElementById('player-modal').classList.add('open');
        }

        function closePlayer() {
            document.getElementById('yt-player').src = "";
            document.getElementById('player-modal').classList.remove('open');
        }

        // Recherche
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') fetchMovies(e.target.value);
        });

        // Start
        setTimeout(() => fetchMovies('films complets français'), 4000);
    </script>
</body>
</html>
