<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POPCORN STREAM | Cinéma & Docs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #050505; --txt: #ffffff; --acc: #facc15; --side: #0d0d0d; }
        .light-mode { --bg: #f3f4f6; --txt: #111827; --acc: #eab308; --side: #ffffff; }

        body { background: var(--bg); color: var(--txt); transition: 0.4s; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* INTRO */
        #intro { position: fixed; inset: 0; z-index: 9999; background: black; display: flex; justify-content: center; align-items: center; animation: fadeOut 0.8s forwards 4s; }
        .m-box { position: relative; display: flex; align-items: center; gap: 20px; }
        .m-pop { font-size: 100px; filter: drop-shadow(0 0 20px var(--acc)); animation: swirl 1.5s ease-out; }
        .m-eye { position: absolute; font-size: 45px; top: 50%; left: 35px; transform: translateY(-20%); opacity: 0; animation: eyeIn 0.5s forwards 1.8s, blink 0.3s infinite 3s; }
        .m-name { font-family: 'Syncopate'; font-size: 45px; color: var(--acc); text-transform: uppercase; opacity: 0; animation: txtIn 1s forwards 2.2s; }
        
        @keyframes swirl { from { transform: rotate(-180deg) scale(0); opacity: 0; } to { transform: rotate(0) scale(1); opacity: 1; } }
        @keyframes eyeIn { to { opacity: 1; } }
        @keyframes blink { 0%, 90%, 100% { transform: translateY(-20%) scaleY(1); } 95% { transform: translateY(-20%) scaleY(0); } }
        @keyframes txtIn { to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* UI */
        .sidebar { width: 260px; height: 100vh; position: fixed; left: 0; top: 0; background: var(--side); border-right: 1px solid rgba(128,128,128,0.1); padding: 30px; z-index: 100; }
        .topbar { position: fixed; top: 0; left: 260px; right: 0; height: 80px; background: var(--bg); display: flex; align-items: center; padding: 0 40px; z-index: 50; border-bottom: 1px solid rgba(128,128,128,0.1); }
        .content { margin-left: 260px; padding: 110px 40px 40px; }

        .card { background: rgba(128,128,128,0.05); border-radius: 12px; overflow: hidden; transition: 0.3s; cursor: pointer; }
        .card:hover { border-color: var(--acc); transform: translateY(-5px); background: rgba(128,128,128,0.1); }

        #settings-panel { max-height: 0; overflow: hidden; transition: 0.5s; background: rgba(255,255,255,0.05); border-radius: 8px; }
        #settings-panel.open { max-height: 250px; padding: 15px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.1); }

        #modal { position: fixed; inset: 0; background: black; z-index: 2000; display: none; justify-content: center; align-items: center; flex-direction: column; }
        #modal.active { display: flex; }
    </style>
</head>
<body>

    <div id="intro">
        <div class="m-box">
            <div class="m-pop">🍿<div class="m-eye">👁️</div></div>
            <div class="m-name">Popcorn<br><span style="color:white">Stream</span></div>
        </div>
    </div>

    <aside class="sidebar">
        <h1 class="text-xl font-black text-yellow-500 italic mb-10 tracking-tighter">POPCORN STREAM</h1>
        <nav class="space-y-2 font-bold text-gray-400">
            <button onclick="load('films complets')" class="w-full text-left p-3 rounded-lg hover:bg-yellow-500 hover:text-black transition">🔥 À LA UNE</button>
            <button onclick="load('film action complet')" class="w-full text-left p-3 rounded-lg hover:bg-yellow-500 hover:text-black transition">🎬 ACTION</button>
            <button onclick="load('documentaire complet')" class="w-full text-left p-3 rounded-lg hover:bg-yellow-500 hover:text-black transition">🌍 DOCUMENTAIRES</button>
            <button onclick="load('bande annonce cinema')" class="w-full text-left p-3 rounded-lg hover:bg-yellow-500 hover:text-black transition">🎞️ BANDES-ANNONCES</button>
            
            <div class="pt-6">
                <button onclick="document.getElementById('settings-panel').classList.toggle('open')" class="w-full flex justify-between p-3 bg-white/5 rounded-lg text-xs uppercase tracking-widest">
                    ⚙️ Paramètres <span>▾</span>
                </button>
                <div id="settings-panel">
                    <div class="space-y-4 text-[10px]">
                        <div class="flex justify-between items-center">
                            PAYS:
                            <select id="lang" onchange="load('films complets')" class="bg-black border border-gray-700 rounded text-white p-1">
                                <option value="fr">FRANCE 🇫🇷</option>
                                <option value="en">USA 🇺🇸</option>
                            </select>
                        </div>
                        <div class="flex justify-between items-center">
                            MODE:
                            <button onclick="document.body.classList.toggle('light-mode')" class="bg-yellow-500 text-black px-2 py-1 rounded font-bold uppercase">Éclairage</button>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </aside>

    <header class="topbar">
        <div class="w-full max-w-xl relative">
            <input type="text" id="search" placeholder="Tapez un film (ex: Kaizen, Batman...)" class="w-full bg-white/5 border border-white/10 rounded-xl px-12 py-3 outline-none focus:border-yellow-500 transition">
            <span class="absolute left-4 top-3.5 opacity-40">🔍</span>
        </div>
    </header>

    <main class="content">
        <h2 id="title" class="text-3xl font-black mb-8 italic uppercase tracking-tighter">Chargement...</h2>
        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </main>

    <div id="modal">
        <button onclick="closeP()" class="absolute top-8 right-8 bg-white text-black px-4 py-2 rounded-full font-bold hover:bg-yellow-500 transition">× FERMER LA SÉANCE</button>
        <div class="w-[85%] max-w-5xl aspect-video bg-black shadow-2xl border-4 border-white/10">
            <iframe id="player" width="100%" height="100%" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <p class="mt-4 text-yellow-500 font-mono tracking-widest animate-pulse uppercase text-sm">Publicité Cinéma en cours... (Simulée)</p>
    </div>

    <script>
        const KEY = "AIzaSyDXc2iuxIR4TXYr53Co43RHVii2Tc7FLgs";
        
        async function load(q) {
            const grid = document.getElementById('grid');
            const lang = document.getElementById('lang').value;
            const titleElem = document.getElementById('title');
            
            titleElem.innerText = q.toUpperCase();
            grid.innerHTML = "<div class='col-span-full text-center py-20 opacity-50 animate-bounce'>🍿 Préparation du popcorn...</div>";

            // LOGIQUE DE FILTRAGE INTELLIGENT
            let duration = "long"; // Par défaut +20min
            let finalQuery = q;

            // Si c'est une bande annonce ou une recherche spécifique type Kaizen
            if (q.toLowerCase().includes('bande') || q.toLowerCase().includes('kaizen') || q.toLowerCase().includes('trailer')) {
                duration = "any"; 
            }

            if (lang === 'fr') finalQuery += " complet français";
            else finalQuery += " full movie english";

            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=16&q=${encodeURIComponent(finalQuery)}&type=video&relevanceLanguage=${lang}&videoDuration=${duration}&key=${KEY}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();

                if (data.items && data.items.length > 0) {
                    grid.innerHTML = "";
                    data.items.forEach(item => {
                        grid.innerHTML += `
                            <div class="card border border-white/5" onclick="openP('${item.id.videoId}')">
                                <img src="${item.snippet.thumbnails.high.url}" class="w-full aspect-video object-cover">
                                <div class="p-4">
                                    <h3 class="font-bold text-sm line-clamp-2">${item.snippet.title}</h3>
                                    <p class="text-[10px] text-yellow-500 mt-2 font-bold uppercase tracking-widest">${item.snippet.channelTitle}</p>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    grid.innerHTML = "<p class='col-span-full text-center'>Aucun film trouvé. Essayez un autre mot-clé !</p>";
                }
            } catch (e) {
                grid.innerHTML = "<p class='col-span-full text-center text-red-500'>Erreur de connexion.</p>";
            }
        }

        function openP(id) {
            // Effet "Publicité avant film"
            const modal = document.getElementById('modal');
            const player = document.getElementById('player');
            modal.classList.add('active');
            
            // On attend 1s pour simuler le lancement
            setTimeout(() => {
                player.src = `https://www.youtube.com/embed/${id}?autoplay=1&modestbranding=1&rel=0`;
            }, 500);
        }

        function closeP() {
            document.getElementById('player').src = "";
            document.getElementById('modal').classList.remove('active');
        }

        document.getElementById('search').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') load(e.target.value);
        });

        // Lancement auto après l'intro
        setTimeout(() => load('films complets'), 4500);
    </script>
</body>
</html>
