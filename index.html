<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLUX DE POP-CORN</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050608; --surface: #0f1219; --gold: #c5a059; --text: #eaeaea;
    --sidebar: 240px; --border: rgba(255,255,255,0.05);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; height: 100vh; }

  /* --- INTRO ORIGINALE (IMAGE 2) --- */
  #intro {
    position: fixed; inset: 0; z-index: 9999; background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    animation: introFade 0.8s ease-in forwards 5s;
  }
  .mascot-intro { position: relative; font-size: 100px; margin-bottom: 20px; }
  .eye-intro { position: absolute; font-size: 35px; top: 55%; left: 50%; transform: translate(-50%, -50%); animation: blink 0.3s infinite 3s; }
  .intro-title { font-family: 'Bebas Neue'; font-size: 80px; color: var(--gold); letter-spacing: 5px; }

  @keyframes blink { 0%, 85%, 100% { transform: translate(-50%, -50%) scaleY(1); } 92% { transform: translate(-50%, -50%) scaleY(0.1); } }
  @keyframes introFade { to { opacity: 0; visibility: hidden; } }

  /* --- CHARGEMENT VIDÉO (TOURNE SEULEMENT) --- */
  #loader {
    position: fixed; inset: 0; z-index: 8000; background: #000;
    display: none; flex-direction: column; align-items: center; justify-content: center;
  }
  .spin-box { position: relative; animation: spin 1s linear infinite; }
  @keyframes spin { 100% { transform: rotate(360deg); } }

  /* --- LAYOUT (IMAGE 3) --- */
  #sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar); background: #0a0b0e; border-right: 1px solid var(--border); padding: 20px; z-index: 100; }
  .logo-side { color: var(--gold); font-family: 'Bebas Neue'; font-size: 22px; display: flex; align-items: center; gap: 10px; margin-bottom: 40px; }
  
  .nav-btn { background: none; border: none; color: #7a8499; width: 100%; text-align: left; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 6px; font-size: 13px; text-transform: uppercase; margin-bottom: 5px; }
  .nav-btn.active { background: rgba(197, 160, 89, 0.15); color: var(--gold); }

  #main { position: fixed; left: var(--sidebar); right: 0; top: 0; bottom: 0; overflow-y: auto; padding: 60px 40px; }
  .section-title { font-family: 'Bebas Neue'; font-size: 40px; margin-bottom: 30px; letter-spacing: 2px; }
  
  .vgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
  .vcard { background: #161a23; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid var(--border); }
  .vcard:hover { border-color: var(--gold); transform: translateY(-5px); }
  .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #222; }
  .vinfo { padding: 15px; font-weight: bold; font-size: 14px; line-height: 1.4; }

  /* --- PLAYER --- */
  #modal { position: fixed; inset: 0; background: #000; z-index: 9000; display: none; align-items: center; justify-content: center; flex-direction: column; }
  #modal.open { display: flex; }
</style>
</head>
<body>

<div id="intro">
  <div class="mascot-intro">🍿<div class="eye-intro">👁️</div></div>
  <div class="intro-title">FLUX DE POP-CORN</div>
</div>

<div id="loader">
    <div class="spin-box" style="font-size: 60px;">🍿<div style="position:absolute; font-size:20px; top:55%; left:50%; transform:translate(-50%, -50%);">👁️</div></div>
</div>

<aside id="sidebar">
  <div class="logo-side">🍿 FLUX DE POP-CORN</div>
  <button class="nav-btn active" onclick="showHome()">🔥 À LA UNE</button>
  <button class="nav-btn" onclick="loadCat('science')">🔬 SCIENCE (NOZMAN)</button>
  <button class="nav-btn" onclick="loadCat('trailers')">🎬 BANDES-ANNONCES</button>
</aside>

<main id="main">
  <h2 class="section-title" id="stitle">À LA UNE</h2>
  <div class="vgrid" id="grid"></div>
</main>

<div id="modal">
    <button style="position:absolute; top:20px; right:30px; color:#fff; background:none; border:1px solid #fff; padding:8px 20px; border-radius:20px; cursor:pointer;" onclick="closeP()">FERMER ✕</button>
    <iframe id="player" width="85%" height="80%" src="" frameborder="0" allowfullscreen allow="autoplay"></iframe>
    <div style="color:var(--gold); font-family:'Bebas Neue'; font-size:30px; margin-top:20px;">BON VISIONNAGE</div>
</div>

<script>
const API_KEY = 'AIzaSyDXc2iuxIR4TXYr53Co43RHVii2Tc7FLgs';
const CHANNELS = {
  science: 'UCaNlbnghtwlsGF-KzAFThqA',
  trailers: 'UC_i8X3p8oZNaik8X513Zn1Q'
};

function openP(id) {
    const l = document.getElementById('loader');
    l.style.display = 'flex';
    setTimeout(() => {
        document.getElementById('player').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
        document.getElementById('modal').classList.add('open');
        l.style.display = 'none';
    }, 1500);
}

function closeP() {
    document.getElementById('player').src = "";
    document.getElementById('modal').classList.remove('open');
}

async function loadCat(key) {
    const g = document.getElementById('grid');
    document.getElementById('stitle').innerText = key === 'science' ? 'SCIENCE (NOZMAN)' : 'BANDES-ANNONCES';
    g.innerHTML = "<p>Chargement...</p>";
    
    try {
        const r = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNELS[key]}&part=snippet,id&order=date&maxResults=9&type=video`);
        const d = await r.json();
        g.innerHTML = "";
        d.items.forEach(v => {
            g.innerHTML += `<div class="vcard" onclick="openP('${v.id.videoId}')">
                <img class="thumb" src="https://i.ytimg.com/vi/${v.id.videoId}/mqdefault.jpg">
                <div class="vinfo">${v.snippet.title}</div>
            </div>`;
        });
    } catch(e) { g.innerHTML = "Erreur quota ou clé."; }
}

function showHome() {
    document.getElementById('stitle').innerText = 'À LA UNE';
    document.getElementById('grid').innerHTML = `
        <div class="vcard" onclick="openP('O-2u2CscyU0')">
            <img class="thumb" src="https://i.ytimg.com/vi/O-2u2CscyU0/mqdefault.jpg">
            <div class="vinfo">KAIZEN — Everest</div>
        </div>
    `;
}

setTimeout(showHome, 5500);
</script>
</body>
</html>
