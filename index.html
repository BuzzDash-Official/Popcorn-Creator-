<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuzzDash - Live</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; }
        .nav { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: #111; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .logo { font-weight: 900; color: #ff0050; font-size: 20px; }
        #viewport { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; padding-top: 60px; }
        .slide { height: calc(100vh - 60px); scroll-snap-align: start; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .v-container { width: 90%; max-width: 800px; height: 70%; border-radius: 10px; overflow: hidden; background: #222; }
        iframe { width: 100%; height: 100%; border: none; }
        .btn { background: #ff0050; border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="nav">
    <div class="logo">BUZZDASH</div>
    <div>
        <button class="btn" onclick="fetchVideos(20)">GAMING</button>
        <button class="btn" style="background:#444" onclick="fetchVideos(24)">SHORTS</button>
    </div>
</div>

<div id="viewport"></div>

<script>
    // METS BIEN TA CLÉ CI-DESSOUS
    const API_KEY = 'AIzaSyDXc2iuxIR4TXYr53Co43RHVii2Tc7FLgs'; 

    async function fetchVideos(cat) {
        try {
            const r = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=id&chart=mostPopular&maxResults=20&regionCode=FR&videoCategoryId=${cat}&key=${API_KEY}`);
            const d = await r.json();
            const container = document.getElementById('viewport');
            container.innerHTML = '';
            d.items.forEach(v => {
                const s = document.createElement('div');
                s.className = 'slide';
                s.innerHTML = `<div class="v-container"><iframe src="https://www.youtube.com/embed/${v.id}"></iframe></div>`;
                container.appendChild(s);
            });
        } catch (e) {
            alert("Erreur de chargement. Vérifie ta clé API YouTube.");
        }
    }
    fetchVideos(20); // Lance le gaming au départ
</script>
</body>
</html>
