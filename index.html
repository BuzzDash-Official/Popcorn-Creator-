<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuzzDash | L'Expérience Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #9d00ff; --accent-glow: rgba(157, 0, 255, 0.4); --bg: #000000; --side: #0a0a0a; --nav-h: 70px; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Poppins', sans-serif; overflow: hidden; display: flex; }
        
        /* Barre Latérale "Accordéon" */
        .sidebar { width: 250px; height: 100vh; background: var(--side); border-right: 1px solid #222; display: flex; flex-direction: column; padding-top: 80px; box-sizing: border-box; }
        .side-item { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; gap: 15px; font-size: 16px; font-weight: 700; transition: 0.2s; color: #aaa; }
        .side-item:hover, .side-item.active { background: #1a1a1a; color: white; }
        .side-item.active { border-left: 4px solid var(--accent); color: var(--accent); }

        /* Panneau Paramètres Clignotant */
        .settings-header { color: #aaa; padding: 10px 25px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; text-transform: uppercase; font-size: 13px; font-weight: 700; margin-top: 30px; border-top: 1px solid #1a1a1a; }
        .settings-header:hover { color: white; }
        .settings-content { overflow: hidden; max-height: 0; transition: max-height 0.4s ease-out; background: #080808; }
        .settings-content.open { max-height: 150px; }
        
        /* Switch iOS style */
        .setting-row { padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: #ccc; }
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(18px); }

        /* Contenu Principal */
        .main-content { flex: 1; height: 100vh; position: relative; }
        
        /* Nav centrée et stylée */
        .nav { height: var(--nav-h); display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); position: fixed; top: 0; left: 250px; right: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .logo-abs { position: absolute; left: 30px; font-weight: 900; color: var(--accent); font-size: 26px; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 15px var(--accent-glow); }
        .btn-group { display: flex; gap: 8px; background: #0a0a0a; padding: 6px; border-radius: 30px; border: 1px solid #222; }
        .btn { background: transparent; border: none; color: #888; padding: 10px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 13px; transition: 0.3s; }
        .btn.active { background: var(--accent); color: white; box-shadow: 0 0 10px var(--accent-glow); }

        /* Viewport */
        #viewport { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        #viewport::-webkit-scrollbar { display: none; }

        .slide { height: 100vh; width: 100%; scroll-snap-align: start; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; padding-top: calc(var(--nav-h) + 20px); box-sizing: border-box; }
        
        /* Cadrage Dynamique */
        .v-card { width: 90%; max-width: 900px; aspect-ratio: 16/9; background: #000; border-radius: 16px; overflow: hidden; border: 1px solid #222; box-shadow: 0 10px 50px rgba(0,0,0,0.8); }
        .vertical .v-card { max-width: 420px; aspect-ratio: unset; height: 90vh; /* GRAND CADRE SHORTS */ }
        iframe { width: 100%; height: 100%; border: none; }

        /* Infos Youtubeur */
        .v-info { width: 90%; max-width: 900px; margin-top: 15px; text-align: left; }
        .vertical .v-info { display: none; /* Cache les infos sous les shorts pour gagner de la place */ }
        .channel-name { font-weight: 900; color: var(--accent); text-decoration: none; font-size: 18px; display: inline-flex; align-items: center; gap: 8px; }
        .channel-name:hover { text-decoration: underline; }

        /* Flèches Néon */
        .arrows { position: fixed; right: 40px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .arr-btn { width: 55px; height: 55px; border-radius: 50%; border: 1px solid #333; background: rgba(0,0,0,0.6); color: white; cursor: pointer; font-size: 26px; transition: 0.3s; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .arr-btn:hover { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
        
        @media (max-width: 1000px) { .sidebar { display: none; } .nav { left: 0; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="side-item active">🏠 Accueil</div>
        <div class="side-item">🔥 Tendances</div>
        <div class="side-item">🎮 Gaming</div>
        
        <div class="settings-header" onclick="toggleSettings()">⚙️ Paramètres <span id="set-icon">▼</span></div>
        <div id="set-panel" class="settings-content">
            <div class="setting-row">
                <span>Son par défaut</span>
                <label class="switch"><input type="checkbox" id="set-sound" onchange="saveSettings()"><span class="slider"></span></label>
            </div>
            <div class="setting-row">
                <span>Auto-Scroll à la fin</span>
                <label class="switch"><input type="checkbox" id="set-autoscroll" onchange="saveSettings()"><span class="slider"></span></label>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="nav">
            <div class="logo-abs">BUZZDASH</div>
            <div class="btn-group">
                <button id="b-gaming" class="btn active" onclick="changeMode('gaming')">Gaming</button>
                <button id="b-shorts" class="btn" onclick="changeMode('shorts')">Shorts</button>
            </div>
        </div>

        <div class="arrows">
            <button class="arr-btn" onclick="scrollMove(-1)">↑</button>
            <button class="arr-btn" onclick="scrollMove(1)">↓</button>
        </div>

        <div id="viewport"></div>
    </div>

<script>
    const API_KEY = 'AIzaSyDXc2iuxIR4TXYr53Co43RHVii2Tc7FLgs'; 
    let currentMode = 'gaming';
    let players = []; // Stocke les lecteurs YouTube

    // YouTube IFrame API
    let tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function loadSettings() {
        document.getElementById('set-sound').checked = localStorage.getItem('buzz-sound') === 'true';
        document.getElementById('set-autoscroll').checked = localStorage.getItem('buzz-auto') === 'true';
    }

    function saveSettings() {
        localStorage.setItem('buzz-sound', document.getElementById('set-sound').checked);
        localStorage.setItem('buzz-auto', document.getElementById('set-autoscroll').checked);
        // Force le rechargement pour appliquer le son
        loadContent(currentMode === 'gaming' ? 20 : 24);
    }

    function toggleSettings() {
        const panel = document.getElementById('set-panel');
        const icon = document.getElementById('set-icon');
        panel.classList.toggle('open');
        icon.innerText = panel.classList.contains('open') ? '▲' : '▼';
    }

    async function loadContent(catId) {
        const vp = document.getElementById('viewport');
        vp.innerHTML = '<div style="padding:150px; text-align:center; font-size:20px;">Chargement du flux néon...</div>';
        players = []; // Reset players

        try {
            const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails,id&chart=mostPopular&maxResults=20&regionCode=FR&videoCategoryId=${catId}&key=${API_KEY}`);
            const data = await res.json();
            vp.innerHTML = '';

            data.items.forEach(item => {
                // Filtre intelligent : on prend tout pour Gaming, mais on refuse les ratios horizontaux pour Shorts
                if(currentMode === 'shorts') {
                    // Si la vidéo est horizontale (16:9), on la zappe
                    const d = item.contentDetails;
                    if(d.definition === 'hd' && !item.snippet.title.toLowerCase().includes('short')) {
                        return; // Ignore cette vidéo longue affichée en shorts
                    }
                }

                const slide = document.createElement('div');
                slide.className = `slide ${currentMode === 'shorts' ? 'vertical' : ''}`;
                const randomId = 'p-' + Math.random().toString(36).substr(2, 9);
                
                slide.innerHTML = `
                    <div class="v-card">
                        <div id="${randomId}"></div>
                    </div>
                    <div class="v-info">
                        <a href="https://www.youtube.com/channel/${item.snippet.channelId}" target="_blank" class="channel-name">@${item.snippet.channelTitle}</a>
                    </div>
                `;
                vp.appendChild(slide);

                // Ajoute un lecteur YouTube
                players.push({ id: randomId, videoId: item.id });
            });
            onYouTubeIframeAPIReady(); // Lance la création des players
        } catch (e) { console.log(e); }
    }

    function onYouTubeIframeAPIReady() {
        players.forEach((p, index) => {
            const isMuted = !document.getElementById('set-sound').checked;
            p.player = new YT.Player(p.id, {
                videoId: p.videoId,
                playerVars: { autoplay: 0, mute: (isMuted ? 1 : 0), rel: 0, modestbranding: 1, fs: 1 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        });
        setupObserver();
    }

    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.ENDED) { // La vidéo est finie
            if(document.getElementById('set-autoscroll').checked) {
                scrollMove(1);
            }
        }
    }

    function setupObserver() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const playerId = entry.target.querySelector('.v-card > div').id;
                const p = players.find(x => x.id === playerId);
                if (entry.isIntersecting) {
                    if(p && p.player && p.player.playVideo) p.player.playVideo();
                } else {
                    if(p && p.player && p.player.pauseVideo) p.player.pauseVideo();
                }
            });
        }, { threshold: 0.8 });

        document.querySelectorAll('.slide').forEach(s => observer.observe(s));
    }

    function changeMode(m) {
        currentMode = m;
        document.getElementById('b-gaming').classList.toggle('active', m === 'gaming');
        document.getElementById('b-shorts').classList.toggle('active', m === 'shorts');
        loadContent(m === 'gaming' ? 20 : 24);
    }

    function scrollMove(d) {
        document.getElementById('viewport').scrollBy(0, window.innerHeight * d);
    }

    loadSettings();
    loadContent(20);
</script>
</body>
</html>
