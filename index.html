<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuzzDash | Live Trends</title>
    
    <meta name="google-adsense-account" content="ca-pub-4636323611777367">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #007bff; --bg: #000000; --side: #080808; --text: #ffffff; --border: #1a1a1a; --card: #111; }
        .light-mode { --bg: #f0f0f0; --side: #ffffff; --text: #000000; --border: #dddddd; --card: #fff; }

        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; display: flex; transition: 0.3s; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 240px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding-top: 80px; z-index: 1001; flex-shrink: 0; }
        .side-item { padding: 12px 25px; cursor: pointer; color: #888; transition: 0.2s; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .side-item:hover { color: var(--accent); background: rgba(0,123,255,0.05); }
        .side-item.active { border-left: 4px solid var(--accent); color: var(--accent); background: rgba(0,123,255,0.1); }
        
        .filter-label { padding: 20px 25px 5px; font-size: 11px; color: #555; font-weight: bold; text-transform: uppercase; }

        .settings-header { padding: 15px 25px; cursor: pointer; border-top: 1px solid var(--border); margin-top: auto; color: #aaa; display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; }
        .settings-content { max-height: 0; overflow: hidden; transition: 0.3s; background: rgba(0,0,0,0.2); }
        .settings-content.open { max-height: 150px; }
        .set-row { padding: 10px 25px; display: flex; justify-content: space-between; font-size: 12px; }

        .nav { height: 70px; display: flex; justify-content: space-between; align-items: center; background: var(--bg); position: fixed; top: 0; left: 0; right: 0; z-index: 1000; border-bottom: 1px solid var(--border); padding: 0 30px; }
        .logo { font-weight: 900; color: var(--accent); font-size: 24px; text-shadow: 0 0 10px var(--accent); }
        .search-container { flex: 1; max-width: 400px; margin: 0 20px; }
        .search-bar { width: 100%; background: #111; border: 1px solid var(--border); padding: 10px 15px; border-radius: 20px; color: white; outline: none; }
        
        .btn-group { display: flex; gap: 5px; background: rgba(128,128,128,0.1); padding: 5px; border-radius: 30px; border: 1px solid var(--border); }
        .btn { background: transparent; border: none; color: #888; padding: 8px 18px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .btn.active { background: var(--accent); color: white; }

        #main-content { flex: 1; margin-top: 70px; overflow-y: auto; height: calc(100vh - 70px); position: relative; }

        /* PUBS */
        .ad-spot { background: rgba(255,255,255,0.03); border: 1px dashed #333; color: #555; font-size: 10px; display: flex; align-items: center; justify-content: center; border-radius: 8px; margin: 15px; }
        .ad-top-grid { height: 90px; width: calc(100% - 30px); }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 15px 30px 30px; }
        .v-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .v-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .thumb { width: 100%; aspect-ratio: 16/9; background-size: cover; background-position: center; }
        .v-meta { padding: 12px; }
        .v-title { font-size: 14px; font-weight: bold; color: var(--text); height: 40px; overflow: hidden; }

        #shorts-area { height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; display: none; }
        #shorts-area::-webkit-scrollbar { display: none; }
        .short-slide { height: 100%; display: flex; justify-content: center; align-items: center; scroll-snap-align: start; position: relative; }
        .short-box { height: 85vh; aspect-ratio: 9/16; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid var(--border); z-index: 2; }
        
        .ad-side-short { position: absolute; width: 160px; height: 600px; top: 50%; transform: translateY(-50%); }
        .ad-l { left: 40px; } .ad-r { right: 40px; }

        .arrows { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); display: none; flex-direction: column; gap: 15px; z-index: 1100; }
        .arrow { background: var(--side); border: 1px solid var(--border); color: var(--text); width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }

        #player-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .close-player { position: absolute; top: 20px; right: 30px; font-size: 40px; color: white; cursor: pointer; }
        #player-iframe { width: 80%; aspect-ratio: 16/9; max-width: 1000px; border: 1px solid var(--accent); }

        @media (max-width: 1200px) { .ad-side-short { display: none; } }
    </style>
</head>
<body>

    <div class="nav">
        <div class="logo">BUZZDASH</div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="Rechercher..." onkeypress="handleSearch(event)">
        </div>
        <div class="btn-group">
            <button id="b-long" class="btn active" onclick="switchType('long')">Vidéos</button>
            <button id="b-short" class="btn" onclick="switchType('short')">Shorts</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="filter-label">THERMOMÈTRE FR</div>
        <div id="f-pop" class="side-item active" onclick="setFilter('pop')">🔥 Populaires</div>
        <div id="f-neutre" class="side-item" onclick="setFilter('neutre')">⚖️ Neutre</div>
        <div id="f-froid" class="side-item" onclick="setFilter('froid')">🧊 Froid</div>
        
        <div class="settings-header" onclick="document.getElementById('set-panel').classList.toggle('open')">⚙️ OPTIONS <span>▼</span></div>
        <div id="set-panel" class="settings-content">
            <div class="set-row"><span>Mode Clair</span> <input type="checkbox" id="p-light" onchange="toggleTheme()"></div>
            <div class="set-row"><span>Son Auto</span> <input type="checkbox" id="p-son"></div>
        </div>
    </div>

    <div class="arrows" id="nav-arrows">
        <button class="arrow" onclick="navMove(-1)">↑</button>
        <button class="arrow" onclick="navMove(1)">↓</button>
    </div>

    <div id="main-content">
        <div id="ad-top-grid" class="ad-spot ad-top-grid">PUB BANNIÈRE HAUTE</div>
        <div id="grid-area" class="video-grid"></div>
        <div id="shorts-area"></div>
    </div>

    <div id="player-overlay">
        <span class="close-player" onclick="closePlayer()">×</span>
        <iframe id="player-iframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

<script>
    const KEY = 'AIzaSyDXc2iuxIR4TXYr53Co43RHVii2Tc7FLgs'; 
    let currentType = 'long';
    let currentFilter = 'pop';
    let currentPos = 0;

    function handleSearch(e) { if (e.key === 'Enter') load(e.target.value); }
    function toggleTheme() { document.body.classList.toggle('light-mode', document.getElementById('p-light').checked); }

    function switchType(type) {
        currentType = type;
        document.getElementById('b-long').classList.toggle('active', type === 'long');
        document.getElementById('b-short').classList.toggle('active', type === 'short');
        document.getElementById('grid-area').style.display = type === 'long' ? 'grid' : 'none';
        document.getElementById('ad-top-grid').style.display = type === 'long' ? 'flex' : 'none';
        document.getElementById('shorts-area').style.display = type === 'short' ? 'block' : 'none';
        document.getElementById('nav-arrows').style.display = type === 'short' ? 'flex' : 'none';
        currentPos = 0;
        load();
    }

    function navMove(dir) {
        const sa = document.getElementById('shorts-area');
        currentPos += dir * window.innerHeight;
        if(currentPos < 0) currentPos = 0;
        sa.scrollTo({ top: currentPos, behavior: 'smooth' });
    }

    function setFilter(f) {
        currentFilter = f;
        document.querySelectorAll('.side-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`f-${f}`).classList.add('active');
        load();
    }

    async function load(query = "") {
        let order = "viewCount"; 
        let q = query || "trending";
        if(currentFilter === 'froid') { order = "date"; q = query || "nouveau"; }
        if(currentFilter === 'neutre') { order = "relevance"; q = query || "buzz"; }

        let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=25&regionCode=FR&type=video&order=${order}&q=${encodeURIComponent(q)}&key=${KEY}`;
        if(currentType === 'short') url += "&videoDuration=short";

        try {
            const r = await fetch(url);
            const d = await r.json();
            render(d.items);
        } catch(e) { console.log("Erreur API"); }
    }

    function render(items) {
        const grid = document.getElementById('grid-area');
        const shorts = document.getElementById('shorts-area');
        grid.innerHTML = ''; shorts.innerHTML = '';

        items.forEach(item => {
            const v = item.snippet;
            const id = item.id.videoId;
            
            if(currentType === 'long') {
                grid.innerHTML += `
                    <div class="v-card" onclick="openPlayer('${id}')">
                        <div class="thumb" style="background-image:url('${v.thumbnails.high.url}')"></div>
                        <div class="v-meta"><div class="v-title">${v.title}</div></div>
                    </div>`;
            } else {
                shorts.innerHTML += `
                    <div class="short-slide">
                        <div class="ad-spot ad-side-short ad-l">PUB LATERALE</div>
                        <div class="short-box">
                            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}?enablejsapi=1&mute=1" frameborder="0"></iframe>
                        </div>
                        <div class="ad-spot ad-side-short ad-r">PUB LATERALE</div>
                    </div>`;
            }
        });
        if(currentType === 'short') initObs();
    }

    function initObs() {
        const obs = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const ifr = entry.target.querySelector('iframe');
                if (entry.isIntersecting) {
                    ifr.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                    if(document.getElementById('p-son').checked) ifr.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '*');
                } else {
                    ifr.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                }
            });
        }, { threshold: 0.7 });
        document.querySelectorAll('.short-slide').forEach(s => obs.observe(s));
    }

    function openPlayer(id) {
        document.getElementById('player-iframe').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
        document.getElementById('player-overlay').style.display = 'flex';
    }

    function closePlayer() {
        document.getElementById('player-overlay').style.display = 'none';
        document.getElementById('player-iframe').src = '';
    }

    load();
</script>
</body>
</html>
