<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CIRCLE | MonEmpireAuto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e5e5e5; }
        .ancient { font-family: 'Cinzel', serif; }
        .gold-grad { background: linear-gradient(135deg, #d4af37 0%, #fcf6ba 45%, #d4af37 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-panel { background: rgba(10, 10, 10, 0.8); border: 1px solid rgba(212, 175, 55, 0.15); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .gold-border { border-color: rgba(212, 175, 55, 0.3); }
        
        /* Mascotte Pyramide Illuminati Minimaliste */
        .pyramid-container { width: 100px; height: 100px; position: relative; perspective: 1000px; margin-bottom: 2rem; }
        .pyramid { font-size: 60px; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4)); animation: hover 4s infinite ease-in-out; cursor: pointer; }
        @keyframes hover { 0%, 100% { transform: translateY(0); opacity: 0.7; } 50% { transform: translateY(-10px); opacity: 1; } }
        
        input::placeholder { color: #333; font-weight: 300; }
        .reveal { animation: fadeIn 1.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="pyramid-container flex items-center justify-center" onclick="alert('L\'Oeil vous observe.')">
        <div class="pyramid">👁️‍🗨️</div>
    </div>

    <div class="w-full max-w-4xl text-center">
        <h1 class="ancient text-xs tracking-[0.5em] text-gray-500 mb-4">MEMBRE DU CERCLE UNIQUEMENT</h1>
        <h2 class="ancient text-4xl md:text-6xl font-bold gold-grad mb-12">PRÉVOYANCE ABSOLUE</h2>

        <div class="glass-panel p-2 rounded-full flex flex-col md:flex-row items-center gap-2 mb-20 max-w-2xl mx-auto">
            <input id="user-input" class="bg-transparent flex-1 p-5 outline-none text-white text-lg font-light tracking-wide" placeholder="Soumettez vos contraintes à l'Oracle...">
            <button onclick="generer()" id="btn" class="bg-[#d4af37] text-black px-10 py-5 rounded-full font-black uppercase text-xs tracking-widest hover:bg-white transition-all duration-500">
                Interroger
            </button>
        </div>

        <div id="resultat" class="hidden space-y-12 reveal">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-1">
                <div class="glass-panel p-10 gold-border border-b-0 md:border-b md:border-r-0">
                    <p class="text-[10px] tracking-widest text-gray-600 mb-4">REVENU PROJETÉ</p>
                    <p id="gain" class="ancient text-3xl font-bold"></p>
                </div>
                <div class="glass-panel p-10 gold-border border-b-0 md:border-b md:border-r-0">
                    <p class="text-[10px] tracking-widest text-gray-600 mb-4">ACCESSIBILITÉ</p>
                    <p id="diff" class="ancient text-3xl font-bold"></p>
                </div>
                <div class="glass-panel p-10 gold-border">
                    <p class="text-[10px] tracking-widest text-gray-600 mb-4">UNITÉ DE TEMPS</p>
                    <p id="temps" class="ancient text-3xl font-bold"></p>
                </div>
            </div>

            <div class="glass-panel p-12 text-left relative overflow-hidden">
                <div class="absolute top-0 left-0 w-1 h-full bg-[#d4af37]"></div>
                <h3 class="ancient text-2xl mb-8 gold-grad tracking-widest" id="titre-biz"></h3>
                <div id="plan" class="space-y-6 text-gray-400 font-light leading-relaxed border-l border-gray-900 pl-8">
                    </div>
                
                <div class="mt-16 pt-8 border-t border-gray-900 flex justify-between items-center">
                    <span class="text-[10px] text-gray-600 tracking-widest italic">Stratégie sécurisée par MonEmpireAuto</span>
                    <a href="https://systeme.io?sa=tonid" class="text-[#d4af37] hover:text-white transition text-xs font-bold tracking-widest underline decoration-1 underline-offset-8">ACTIVER LE PROTOCOLE →</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function generer() {
            const input = document.getElementById('user-input').value;
            const btn = document.getElementById('btn');
            const key = "TA_CLE_GROQ_ICI"; // ⚠️ METS TA CLÉ ICI !

            if(!input) return;
            btn.innerText = "ANALYSE...";
            btn.disabled = true;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [
                            { role: "system", content: "Tu es l'Oracle du Cercle. Réponds uniquement en JSON. Ton ton est froid, élitiste et précis. Format : {\"nom\":\"\",\"gain\":\"\",\"diff\":\"\",\"temps\":\"\",\"plan\":[\"\",\"\",\"\"]}" },
                            { role: "user", content: input }
                        ],
                        response_format: { type: "json_object" }
                    })
                });
                const data = await response.json();
                const res = JSON.parse(data.choices[0].message.content);

                document.getElementById('titre-biz').innerText = res.nom;
                document.getElementById('gain').innerText = res.gain;
                document.getElementById('diff').innerText = res.diff + "/10";
                document.getElementById('temps').innerText = res.temps;
                document.getElementById('plan').innerHTML = res.plan.map((e, i) => `<p><span class="text-[#d4af37] mr-4">${i+1}.</span> ${e}</p>`).join('');
                
                document.getElementById('resultat').classList.remove('hidden');
            } catch (e) { alert("Accès refusé. Vérifiez votre clé d'initiation."); }
            btn.innerText = "Interroger";
            btn.disabled = false;
        }
    </script>
</body>
</html>
