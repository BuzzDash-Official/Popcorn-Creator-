<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopCorn Stream | Premium Platform</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;700&display=swap');

        :root {
            --gold: #FFD700;
            --red: #E50914;
            --bg: #050505;
            --sidebar-w: 260px;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; background: var(--bg); color: #fff;
            font-family: 'Poppins', sans-serif; overflow: hidden;
        }

        /* --- 1. CINÉMATIQUE D'ENTRÉE : RIDEAUX --- */
        #intro-curtain {
            position: fixed; inset: 0; z-index: 99999; display: flex; justify-content: center; align-items: center; background: #000;
        }
        .curtain-panel {
            position: absolute; width: 50%; height: 100%; background: #800000; 
            border: 2px solid var(--red); transition: transform 1.5s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .panel-left { left: 0; transform-origin: left; }
        .panel-right { right: 0; transform-origin: right; }

        .mascot-anim {
            z-index: 100; text-align: center; opacity: 0; transition: 1s;
        }
        .pop-spin { font-size: 80px; display: inline-block; animation: spinOnce 1.5s ease-out; }
        .eye-pop { font-size: 40px; display: block; margin-top: -20px; opacity: 0; transform: scale(0); }
        .logo-text { font-family: 'Bebas Neue'; font-size: 4rem; color: var(--gold); filter: blur(10px); transition: 1.5s; }

        @keyframes spinOnce { from { transform: rotate(-720deg) scale(0); } to { transform: rotate(0deg) scale(1); } }
        @keyframes blinkEye { 0%, 90% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }

        /* --- 2. LAYOUT : SIDEBAR & NAV --- */
        nav {
            position: fixed; top: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.95);
            display: flex; align-items: center; padding: 0 2%; z-index: 1000; border-bottom: 1px solid var(--glass);
        }
        .search-bar {
            flex-grow: 1; max-width: 600px; margin: 0 50px; position: relative;
        }
        .search-bar input {
            width: 100%; background: #121212; border: 1px solid #333; padding: 10px 20px; border-radius: 20px; color: #fff;
        }

        .sidebar {
            position: fixed; left: 0; top: 70px; width: var(--sidebar-w); height: calc(100vh - 70px);
            background: #000; padding: 20px; overflow-y: auto; border-right: 1px solid var(--glass);
        }
        .sidebar-item {
            padding: 12px 15px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 15px; margin-bottom: 5px;
        }
        .sidebar-item:hover, .sidebar-item.active { background: var(--glass); color: var(--gold); }
        .sidebar h3 { font-size: 0.8rem; color: #666; text-transform: uppercase; margin: 20px 0 10px; }

        /* --- 3. CONTENU PRINCIPAL --- */
        main { margin-left: var(--sidebar-w); padding: 90px 4% 40px; }
        
        .hero-premium {
            width: 100%; border-radius: 20px; overflow: hidden; border: 2px solid var(--gold);
            margin-bottom: 40px; box-shadow: 0 0 30px rgba(255,215,0,0.1);
        }

        .video-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px;
        }
        .movie-card {
            background: #111; border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s;
        }
        .movie-card:hover { transform: scale(1.05); box-shadow: 0 10px 20px #000; }
        .movie-card img { width: 100%; height: 160px; object-fit: cover; }
        .card-info { padding: 12px; }

        /* --- 4. MODE CINÉMA --- */
        #cinema-overlay {
            position: fixed; inset: 0; background: #000; z-index: 10000; display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="intro-curtain">
        <div class="curtain-panel panel-left" id="pl"></div>
        <div class="curtain-panel panel-right" id="pr"></div>
        <div class="mascot-anim" id="m-anim">
            <span class="pop-spin">🍿</span>
            <span class="eye-pop" id="m-eye">👁️</span>
            <div class="logo-text" id="m-logo">POPCORN STREAM</div>
        </div>
    </div>

    <div id="cinema-overlay">
        <div class="pop-spin" style="font-size: 100px;">🍿</div>
        <h2 style="color:var(--gold); font-family:'Bebas Neue'; letter-spacing:4px;">PRÉPARATION DE TA SÉANCE...</h2>
        <div id="player-container" style="display:none; width:80%;">
            <iframe id="video-frame" width="100%" height="500" frameborder="0" allowfullscreen></iframe>
            <h1 style="color:var(--gold); text-align:center;">🍿 BON VISIONNAGE !</h1>
            <button onclick="closeCinema()" style="color:#fff; background:none; border:1px solid #fff; padding:10px 20px; cursor:pointer; margin:auto; display:block;">Quitter</button>
        </div>
    </div>

    <nav>
        <div class="logo-text" style="font-size: 25px; filter:none; opacity:1;">POPCORN STREAM</div>
        <div class="search-bar">
            <input type="text" placeholder="Rechercher un film, un youtubeur...">
        </div>
        <button onclick="toggleLight()" style="background:none; border:1px solid #fff; color:#fff; cursor:pointer;">🔆 LUMINOSITÉ</button>
    </nav>

    <div class="sidebar">
        <h3>Menu</h3>
        <div class="sidebar-item active" onclick="loadContent('all')">🏠 Accueil</div>
        <div class="sidebar-item" onclick="loadContent('dramas')">🔥 Dramas</div>
        <div class="sidebar-item">📑 Ma Liste</div>
        
        <h3>Catégories</h3>
        <div class="sidebar-item" onclick="loadContent('jeux-video')">🎮 Jeux Vidéo</div>
        <div class="sidebar-item" onclick="loadContent('horreur')">👻 Horreur</div>
        <div class="sidebar-item" onclick="loadContent('zone-neutre')">🛡️ Zone Neutre</div>
        <div class="sidebar-item" onclick="loadContent('science')">🧪 Science</div>

        <h3>Abonnements</h3>
        <div class="sidebar-item" onclick="loadContent('Inoxtag')">🍋 Inoxtag</div>
        <div class="sidebar-item" onclick="loadContent('Squeezie')">🎬 Squeezie</div>
        <div class="sidebar-item" onclick="loadContent('Nozman')">🔬 Dr Nozman</div>
    </div>

    <main>
        <section class="hero-premium">
            <iframe src="https://www.youtube.com/embed/wrFsapf0Enk?mute=1" width="100%" height="450" frameborder="0"></iframe>
        </section>

        <h2 id="section-title">À LA UNE</h2>
        <div class="video-grid" id="main-grid">
            </div>
    </main>

    <script>
        // --- DONNÉES ET SIMULATION GOOGLE CLOUD ---
        const DATABASE = [
            { id: 'LpZ6S8-IUKw', title: 'Les objets du futur', creator: 'Nozman', cat: 'science' },
            { id: 'v5E4_6XfM-A', title: 'THREAD HORREUR', creator: 'Squeezie', cat: 'horreur' },
            { id: 'Xj_XvW5WfWk', title: 'Elden Ring Combat', creator: 'Inoxtag', cat: 'jeux-video' },
            { id: '6VgKYd0JWq4', title: 'Trailer Kaizen', creator: 'Inoxtag', cat: 'zone-neutre' }
        ];

        // --- 1. L'INTRO PRO ---
        window.addEventListener('DOMContentLoaded', () => {
            const mAnim = document.getElementById('m-anim');
            const mEye = document.getElementById('m-eye');
            const mLogo = document.getElementById('m-logo');

            // On attend un peu, puis on montre l'anim
            setTimeout(() => { mAnim.style.opacity = "1"; }, 500);
            
            // L'oeil sort
            setTimeout(() => { 
                mEye.style.opacity = "1"; 
                mEye.style.transform = "scale(1)";
                mEye.style.animation = "blinkEye 2s infinite";
            }, 1800);

            // Le logo sort flou puis net
            setTimeout(() => { 
                mLogo.style.filter = "blur(0px)";
                mLogo.style.opacity = "1";
            }, 2500);

            // Les rideaux s'ouvrent
            setTimeout(() => {
                document.getElementById('pl').style.transform = "scaleX(0)";
                document.getElementById('pr').style.transform = "scaleX(0)";
                mAnim.style.opacity = "0";
            }, 4500);

            setTimeout(() => {
                document.getElementById('intro-curtain').style.display = "none";
                document.body.style.overflow = "auto";
            }, 5500);
        });

        // --- 2. LOGIQUE DE CONTENU ---
        function loadContent(filter) {
            const grid = document.getElementById('main-grid');
            const title = document.getElementById('section-title');
            title.innerText = filter.toUpperCase();

            // Simulation Cache/Cloud
            const data = filter === 'all' ? DATABASE : DATABASE.filter(v => v.cat === filter || v.creator === filter);
            
            grid.innerHTML = data.map(v => `
                <div class="movie-card" onclick="openCinema('${v.id}')">
                    <img src="https://img.youtube.com/vi/${v.id}/maxresdefault.jpg">
                    <div class="card-info">
                        <h4>${v.title}</h4>
                        <p style="color:#888;">${v.creator}</p>
                    </div>
                </div>
            `).join('');
        }

        // --- 3. MODE CINÉMA ---
        function openCinema(id) {
            const overlay = document.getElementById('cinema-overlay');
            overlay.style.display = "flex";
            
            setTimeout(() => {
                document.querySelector('#cinema-overlay .pop-spin').style.display = "none";
                document.querySelector('#cinema-overlay h2').style.display = "none";
                document.getElementById('player-container').style.display = "block";
                document.getElementById('video-frame').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
            }, 2500);
        }

        function closeCinema() {
            document.getElementById('cinema-overlay').style.display = "none";
            document.getElementById('video-frame').src = "";
        }

        function toggleLight() {
            document.body.style.filter = document.body.style.filter === 'brightness(0.2)' ? 'brightness(1)' : 'brightness(0.2)';
        }

        window.onload = () => loadContent('all');
    </script>
</body>
</html>
