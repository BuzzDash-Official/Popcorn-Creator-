<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>THE CIRCLE | MonEmpireAuto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #d4af37; font-family: 'Cinzel', serif; }
        .glass { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(212, 175, 55, 0.2); backdrop-filter: blur(10px); }
        .gold-text { background: linear-gradient(to right, #d4af37, #fcf6ba); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
    <div class="text-6xl mb-4 animate-pulse">👁️</div>
    <h1 class="text-xs tracking-[0.5em] text-gray-500 mb-2">MONEMPIREAUTO</h1>
    <h2 class="text-4xl font-bold gold-text mb-12">L'ORACLE DU PROFIT</h2>
    
    <div class="w-full max-w-xl glass p-2 rounded-full flex shadow-2xl">
        <input id="input" class="bg-transparent flex-1 p-4 outline-none text-white placeholder-gray-700" placeholder="Décrivez votre situation...">
        <button onclick="interroger()" id="btn" class="bg-[#d4af37] text-black px-10 py-4 rounded-full font-black uppercase text-xs hover:bg-white transition-all">Interroger</button>
    </div>

    <div id="resultat" class="hidden mt-12 w-full max-w-xl p-8 glass rounded-3xl text-left animate-fade-in">
        <h3 id="biz-name" class="text-2xl font-bold gold-text mb-4"></h3>
        <p id="plan" class="text-gray-400 italic mb-6"></p>
        <div class="text-sm tracking-widest text-gray-500 uppercase">Gain estimé : <span id="cash" class="text-green-500 font-bold"></span></div>
    </div>

    <script>
        async function interroger() {
            const input = document.getElementById('input').value;
            const btn = document.getElementById('btn');
            if(!input) return;
            
            btn.innerText = "ANALYSE...";
            try {
                // On utilise Groq directement pour le test
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": "Bearer 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", "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ role: "system", content: "Expert business. Réponds en JSON: {\"n\":\"Nom du Biz\",\"p\":\"Plan en 2 lignes\",\"c\":\"€€€/mois\"}" }, { role: "user", content: input }],
                        response_format: { type: "json_object" }
                    })
                });
                const data = await response.json();
                const res = JSON.parse(data.choices[0].message.content);
                document.getElementById('biz-name').innerText = res.n;
                document.getElementById('plan').innerText = res.p;
                document.getElementById('cash').innerText = res.c;
                document.getElementById('resultat').classList.remove('hidden');
            } catch (e) { alert("Erreur d'accès à l'Oracle."); }
            btn.innerText = "Interroger";
        }
    </script>
</body>
</html>
