<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonEmpireAuto - IA Business</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; }
        .gradient-text { background: linear-gradient(to right, #3b82f6, #22c55e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto flex flex-col items-center">
        <h1 class="text-5xl font-black mt-10 gradient-text text-center">MonEmpireAuto</h1>
        <p class="text-gray-400 mt-4 text-center">Génère ton business rentable en 60 secondes.</p>

        <div class="w-full max-w-2xl bg-gray-900 p-2 rounded-2xl border border-gray-800 mt-10 flex shadow-2xl">
            <input id="user-input" class="bg-transparent flex-1 p-4 outline-none" placeholder="Ex: J'ai 100€ et je veux gagner 2000€/mois...">
            <button onclick="generer()" id="btn" class="bg-blue-600 px-6 py-4 rounded-xl font-bold hover:bg-blue-500 transition-all">Lancer</button>
        </div>

        <div id="loading" class="hidden mt-10 text-blue-400 animate-pulse">L'IA calcule tes futurs profits...</div>

        <div id="resultat" class="hidden w-full mt-10 space-y-6">
            <div class="grid grid-cols-3 gap-4">
                <div class="bg-gray-900 border border-green-500/30 p-4 rounded-xl text-center">
                    <p class="text-xs text-gray-400">GAIN ESTIMÉ</p>
                    <p id="gain" class="text-xl font-bold text-green-400"></p>
                </div>
                <div class="bg-gray-900 border border-blue-500/30 p-4 rounded-xl text-center">
                    <p class="text-xs text-gray-400">DIFFICULTÉ</p>
                    <p id="diff" class="text-xl font-bold text-blue-400"></p>
                </div>
                <div class="bg-gray-900 border border-purple-500/30 p-4 rounded-xl text-center">
                    <p class="text-xs text-gray-400">TRAVAIL / J</p>
                    <p id="temps" class="text-xl font-bold text-purple-400"></p>
                </div>
            </div>
            <div class="bg-gray-900 p-8 rounded-3xl border border-gray-800">
                <h2 id="titre-biz" class="text-2xl font-bold text-blue-500 mb-4"></h2>
                <div id="plan" class="space-y-3 text-gray-300"></div>
                <div class="mt-8 text-center">
                    <a href="https://systeme.io?sa=tonid" class="bg-blue-600 px-8 py-3 rounded-full font-bold">Lancer ce business (Gratuit)</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function generer() {
            const input = document.getElementById('user-input').value;
            const key = "TA_CLE_GROQ_ICI"; // ⚠️ METS TA CLÉ ICI POUR TESTER
            if(!input) return;

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('btn').disabled = true;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ role: "system", content: "Réponds UNIQUEMENT en JSON: {\"nom\":\"\",\"gain\":\"\",\"diff\":\"\",\"temps\":\"\",\"plan\":[\"\",\"\",\"\"]}" }, { role: "user", content: input }],
                        response_format: { type: "json_object" }
                    })
                });
                const data = await response.json();
                const res = JSON.parse(data.choices[0].message.content);

                document.getElementById('titre-biz').innerText = res.nom;
                document.getElementById('gain').innerText = res.gain;
                document.getElementById('diff').innerText = res.diff + "/10";
                document.getElementById('temps').innerText = res.temps;
                document.getElementById('plan').innerHTML = res.plan.map(e => `• ${e}<br>`).join('');
                document.getElementById('resultat').classList.remove('hidden');
            } catch (e) { alert("Erreur de connexion à l'IA"); }
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('btn').disabled = false;
        }
    </script>
</body>
</html>
